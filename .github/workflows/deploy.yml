name: Deploy to EasyPanel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EasyPanel
        uses: easypanel-io/deploy@v1
        with:
          easypanel-url: ${{ secrets.EASYPANEL_URL }}
          easypanel-token: ${{ secrets.EASYPANEL_TOKEN }}
          project-name: adplatform
